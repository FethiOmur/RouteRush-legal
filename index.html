<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RouteRush — Legal</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #000000;
    --surface: #14161d;
    --text: #ffffff;
    --text-3: rgba(255,255,255,0.42);
    --accent: #00E0FF;
  }
  @font-face {
    font-family: 'Splash';
    src: url('./splash.ttf') format('truetype');
    font-display: swap;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card { text-align: center; padding: 40px 28px; }
  .word {
    font-family: 'Splash', cursive; font-size: 76px; color: #fff;
    letter-spacing: 3px; margin: 0 0 6px; line-height: 1;
    text-shadow: 0 0 40px rgba(0,224,255,0.14);
  }
  .tag { color: var(--text-3); font-size: 13px; letter-spacing: 2px; text-transform: uppercase; margin: 0 0 32px; }
  .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  a {
    text-decoration: none; padding: 12px 26px; border-radius: 999px;
    font-size: 15px; font-weight: 600; transition: opacity .15s ease;
  }
  a.primary { color: #000; background: #fff; }
  a.ghost { color: #fff; background: var(--surface); border: 1px solid rgba(255,255,255,0.12); }
  a:hover { opacity: .85; }
</style>
</head>
<body>
  <div class="card">
    <div class="word">RouteRush</div>
    <p class="tag">Legal &amp; Policies</p>
    <div class="links">
      <a class="primary" href="./privacy.html">Privacy Policy</a>
      <a class="ghost" href="./terms.html">Terms of Service</a>
    </div>
  </div>
</body>
</html>
